<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#fbbf24">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Lawnchair Coach</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ══ HEADER ══════════════════════════════ -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-icon">⚽</span>
      <span class="brand-name">Lawnchair Coach</span>
    </div>
    <div class="header-actions">
      <button id="btn-settings" class="btn-icon-action" aria-label="Settings">
        <!-- Cog-6-tooth icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
      <button id="btn-reset" class="btn-icon-action" aria-label="Reset field (hold)">
        <!-- Rotate / reset icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══ LEGEND ══════════════════════════════ -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot legend-dot-you"></div>
      Your kid
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot-teammate"></div>
      Teammates
    </div>
    <div class="legend-item">
      <div class="legend-dot legend-dot-opponent"></div>
      Opponents
    </div>
  </div>

  <!-- ══ FIELD ════════════════════════════════ -->
  <div class="field-wrapper">
    <div id="field">
      <!-- Field markings -->
      <div class="field-mark line-center"></div>
      <div class="field-mark circle-center"></div>
      <div class="field-mark box-top"></div>
      <div class="field-mark box-bottom"></div>
      <div class="field-mark goal-top"></div>
      <div class="field-mark goal-bottom"></div>

      <!-- SVG overlay: build-out lines + corner arcs -->
      <svg class="field-mark" style="top:0;left:0;width:100%;height:100%;" viewBox="0 0 200 300" preserveAspectRatio="none">
        <line x1="0" y1="100" x2="200" y2="100" stroke="white" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6 4"/>
        <line x1="0" y1="200" x2="200" y2="200" stroke="white" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6 4"/>
        <path d="M 10 0 A 10 10 0 0 1 0 10"        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <path d="M 190 0 A 10 10 0 0 0 200 10"     fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <path d="M 0 290 A 10 10 0 0 1 10 300"     fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <path d="M 200 290 A 10 10 0 0 0 190 300"  fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      </svg>

      <!-- Drawing canvas -->
      <canvas id="draw-canvas"></canvas>
      <!-- Tokens injected by app.js -->
    </div>
  </div>

  <!-- ══ DRAW MODE BANNER ══════════════════════ -->
  <div class="draw-banner">
    <span class="draw-banner-label">DRAW MODE</span>
    <span class="draw-banner-hint">Drag tokens · Draw on field</span>
  </div>

  <!-- ══ TOOLBAR ══════════════════════════════ -->
  <div class="toolbar">

    <button id="btn-draw" class="tool-btn" aria-label="Toggle draw mode">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/>
      </svg>
      Draw
    </button>

    <div class="toolbar-divider"></div>

    <button id="btn-undo" class="tool-btn" aria-label="Undo last stroke" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3"/>
      </svg>
      Undo
    </button>

    <div class="toolbar-divider"></div>

    <button id="btn-clear" class="tool-btn" aria-label="Clear all drawings" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/>
      </svg>
      Clear
    </button>

  </div>

  <!-- ══ SETTINGS OVERLAY + SHEET ════════════ -->
  <div id="settings-overlay" class="settings-overlay"></div>

  <div id="settings-sheet" class="settings-sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Settings</h2>

    <!-- Kid's name -->
    <div class="setting-group">
      <label class="setting-label" for="input-kid-name">Your kid's name</label>
      <input id="input-kid-name" class="setting-input" type="text"
             placeholder="You" maxlength="6" autocomplete="off" autocorrect="off"
             spellcheck="false">
      <p class="setting-hint">Shown on the gold token. Max 6 characters.</p>
    </div>

    <!-- Team size -->
    <div class="setting-group">
      <label class="setting-label">Team size</label>
      <div class="team-size-grid" id="team-size-grid">
        <button class="size-btn" data-size="7v7">7v7</button>
        <button class="size-btn" data-size="9v9">9v9</button>
        <button class="size-btn" data-size="11v11">11v11</button>
      </div>
      <p class="setting-hint">Resets the field to the selected formation.</p>
    </div>

    <!-- Kid's position -->
    <div class="setting-group">
      <label class="setting-label">Your kid's position</label>
      <div class="team-size-grid" id="pos-grid">
        <button class="size-btn" data-pos="gk">GK</button>
        <button class="size-btn" data-pos="def">DEF</button>
        <button class="size-btn" data-pos="mid">MID</button>
        <button class="size-btn" data-pos="fwd">FWD</button>
      </div>
      <p class="setting-hint">Moves the gold token to that starting zone.</p>
    </div>

    <!-- Show / hide opponents -->
    <div class="setting-group setting-row">
      <div>
        <div class="setting-label">Show opposing team</div>
        <p class="setting-hint">Display opponent tokens on the field.</p>
      </div>
      <label class="toggle" aria-label="Show opposing team">
        <input type="checkbox" id="toggle-opponents" checked>
        <span class="toggle-track"></span>
      </label>
    </div>

    <button id="btn-settings-done" class="btn-done">Done</button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
